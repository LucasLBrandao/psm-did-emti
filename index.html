<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSM e DiD explicados com o EMTI</title>
<style>
  :root{
    --bg:#f7f6f3; --ink:#2b2b2b; --muted:#6b6b6b;
    --ctrl:#9aa3ab; --treat:#2f6f7e; --cf:#d98a2b; --axis:#cfcdc6;
    --panel:#ffffffee;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;}
  #app{display:flex;align-items:center;justify-content:center;height:100vh;}
  #stage{position:relative;width:min(100vw,177.78vh);height:min(56.25vw,100vh);
    overflow:hidden;background:var(--bg);}
  svg{position:absolute;inset:0;width:100%;height:100%;}

  /* chrome */
  #titlebar{position:absolute;left:4.2%;top:4.5%;right:22%;pointer-events:none;}
  #title{font-size:clamp(18px,2.5vw,30px);font-weight:700;letter-spacing:.2px;margin:0;}
  #subtitle{font-size:clamp(12px,1.35vw,16px);font-weight:400;color:var(--muted);
    margin:.35em 0 0;line-height:1.35;max-width:46ch;}
  #note{position:absolute;left:4.2%;bottom:4.2%;max-width:40ch;
    font-size:clamp(10px,1.05vw,13px);line-height:1.45;color:#4a4a4a;
    background:var(--panel);border-left:3px solid var(--treat);
    padding:.6em .8em;border-radius:4px;box-shadow:0 1px 6px #0000000f;
    pointer-events:none;}
  #note b{color:var(--treat)}
  #note .term{color:var(--cf);font-weight:600}

  #nav{position:absolute;right:3%;bottom:4.2%;display:flex;align-items:center;
    gap:.5em;font-size:13px;color:var(--muted);}
  #nav button{font:inherit;cursor:pointer;border:1px solid #d3d1ca;background:#fff;
    color:var(--ink);width:34px;height:30px;border-radius:6px;line-height:1;}
  #nav button:hover{background:#f0efe9}
  #counter{min-width:52px;text-align:center;font-variant-numeric:tabular-nums;}

  /* DiD 2x2 table */
  #ditab{position:absolute;right:2.5%;top:6%;width:250px;background:var(--panel);
    border:1px solid #e3e1da;border-radius:10px;padding:11px 13px;
    box-shadow:0 2px 12px #00000012;font-size:12.5px;color:#3a3a3a;
    opacity:0;transform:translateY(-6px);transition:.35s;pointer-events:none;}
  #ditab.on{opacity:1;transform:none;}
  #ditab .tt{font-weight:600;color:var(--treat);margin-bottom:.5em;font-size:12px;}
  #ditab table{width:100%;border-collapse:collapse;text-align:center;}
  #ditab th{color:var(--muted);font-weight:600;padding:2px 4px;border-bottom:1px solid #e3e1da;}
  #ditab td{padding:3px 4px;font-variant-numeric:tabular-nums;}
  #ditab td.g{color:var(--ctrl);text-align:left;font-weight:600;}
  #ditab td.t{color:var(--treat);text-align:left;font-weight:600;}
  #ditab td.d{color:var(--cf);font-weight:600;}
  #ditab .res{margin-top:.6em;padding-top:.5em;border-top:1px solid #e3e1da;text-align:center;}
  #ditab .res b{color:var(--cf);}

  /* fog overlay for unobservables */
  #fog{position:absolute;inset:0;pointer-events:none;opacity:0;transition:.6s;
    background:radial-gradient(120% 90% at 50% 60%,#8a8f9600 40%,#8a8f9636 100%);}
  #fog.on{opacity:1;}
  #fog span{position:absolute;left:50%;top:16%;transform:translateX(-50%);
    font-size:12px;color:#6b6b6b;background:#ffffffcc;padding:3px 9px;border-radius:20px;}

  .legend{position:absolute;right:3%;top:6%;font-size:12px;color:#555;
    background:#ffffffdd;border-radius:6px;padding:7px 11px;line-height:1.85;
    opacity:0;transition:.4s;pointer-events:none;z-index:6;
    box-shadow:0 1px 6px #0000000f;}
  .legend.axis-side{left:4.2%;right:auto;top:31%;}
  .legend.on{opacity:1;}
  .lg-row{white-space:nowrap;}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;
    margin-right:6px;vertical-align:middle;}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <svg id="svg" viewBox="0 0 1300 720" preserveAspectRatio="xMidYMid meet"></svg>

    <div class="legend" id="legend">
      <div class="lg-row" id="lgT"><span class="dot" style="background:var(--treat)"></span>Tratamento — escolas EMTI</div>
      <div class="lg-row" id="lgC"><span class="dot" style="background:var(--ctrl)"></span>Controle — escolas sem EMTI</div>
      <div class="lg-row" id="lgCF"><span class="dot" style="background:var(--cf)"></span>Contrafactual / hipotético</div>
    </div>

    <div id="titlebar">
      <h1 id="title"></h1>
      <p id="subtitle"></p>
    </div>

    <div id="note"></div>

    <div id="ditab">
      <div class="tt">A conta do DiD — taxa de abandono (%)</div>
      <table>
        <tr><th></th><th>Antes</th><th>Depois</th><th>Δ</th></tr>
        <tr><td class="g">Controle</td><td>6,0</td><td>9,0</td><td class="d">+3,0</td></tr>
        <tr><td class="t">EMTI</td><td>8,0</td><td>12,5</td><td class="d">+4,5</td></tr>
      </table>
      <div class="res">DiD = (+4,5) − (+3,0) = <b>+1,5 p.p.</b></div>
    </div>

    <div id="fog"><span>variáveis não observáveis — fora do alcance do PSM</span></div>

    <div id="nav">
      <button id="prev" aria-label="anterior">◀</button>
      <span id="counter">1 / 13</span>
      <button id="next" aria-label="próximo">▶</button>
    </div>
  </div>
</div>

<script>
const SVGNS="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
const gRoot=document.createElementNS(SVGNS,"g"); svg.appendChild(gRoot);

const COL={treat:"#2f6f7e",ctrl:"#9aa3ab",cf:"#d98a2b",axis:"#cfcdc6",ink:"#2b2b2b",muted:"#6b6b6b"};

/* ---------- plot geometry ---------- */
const PX0=250,PX1=1060,PY0=175,PY1=585;
const xAnte=350,xPost=560,x2019=770,x2020=980;
const yD=v=>PY1-(v/16)*(PY1-PY0);           // DiD abandono domain 0..16 (%)
const sx=(v,a,b)=>PX0+((v-a)/(b-a))*(PX1-PX0);
const sy=(v,a,b)=>PY1-((v-a)/(b-a))*(PY1-PY0);
// compressed mapping for the covariate cloud (points sit closer together, central band)
const cxN=v=>sx(v,-0.35,1.35);
const cyF=v=>sy(v,-0.30,1.30);

/* ---------- animation engine ---------- */
const ALL=[]; let animGen=0;
const lerp=(a,b,t)=>a+(b-a)*t;
function commit(dur,gen){
  ALL.forEach(o=>{o.from={};for(const k in o.tar)o.from[k]=o.cur[k];});
  return new Promise(res=>{
    const t0=performance.now();
    function frame(now){
      if(gen!==animGen)return res(false);
      const t=Math.min(1,(now-t0)/dur);
      const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
      ALL.forEach(o=>{for(const k in o.tar)o.cur[k]=lerp(o.from[k],o.tar[k],e);o.render();});
      t<1?requestAnimationFrame(frame):res(true);
    }
    requestAnimationFrame(frame);
  });
}

/* ---------- object factories ---------- */
function mkCircle(){
  const el=document.createElementNS(SVGNS,"circle");gRoot.appendChild(el);
  const o={el,color:COL.ctrl,stroke:"none",sw:0,dash:"",
    cur:{x:650,y:360,r:0,op:0},tar:{x:650,y:360,r:0,op:0},from:{},
    render(){el.setAttribute("cx",this.cur.x);el.setAttribute("cy",this.cur.y);
      el.setAttribute("r",Math.max(0,this.cur.r));el.setAttribute("fill",this.color);
      el.setAttribute("opacity",this.cur.op);el.setAttribute("stroke",this.stroke);
      el.setAttribute("stroke-width",this.sw);if(this.dash)el.setAttribute("stroke-dasharray",this.dash);
      else el.removeAttribute("stroke-dasharray");}};
  ALL.push(o);return o;
}
function mkLine(){
  const el=document.createElementNS(SVGNS,"line");gRoot.appendChild(el);
  const o={el,color:COL.axis,width:1.4,dash:"",
    cur:{x1:0,y1:0,x2:0,y2:0,op:0},tar:{x1:0,y1:0,x2:0,y2:0,op:0},from:{},
    render(){el.setAttribute("x1",this.cur.x1);el.setAttribute("y1",this.cur.y1);
      el.setAttribute("x2",this.cur.x2);el.setAttribute("y2",this.cur.y2);
      el.setAttribute("stroke",this.color);el.setAttribute("stroke-width",this.width);
      el.setAttribute("opacity",this.cur.op);
      if(this.dash)el.setAttribute("stroke-dasharray",this.dash);else el.removeAttribute("stroke-dasharray");}};
  ALL.push(o);return o;
}
function mkText(size,weight,anchor){
  const el=document.createElementNS(SVGNS,"text");gRoot.appendChild(el);
  el.setAttribute("font-family","system-ui,-apple-system,Segoe UI,Roboto,sans-serif");
  el.setAttribute("font-size",size);el.setAttribute("font-weight",weight);
  el.setAttribute("text-anchor",anchor);el.setAttribute("dominant-baseline","middle");
  const o={el,txt:"",fill:"#3a3a3a",
    cur:{x:0,y:0,op:0},tar:{x:0,y:0,op:0},from:{},
    set(s){this.txt=s;},
    render(){el.textContent=this.txt;el.setAttribute("x",this.cur.x);el.setAttribute("y",this.cur.y);
      el.setAttribute("fill",this.fill);el.setAttribute("opacity",this.cur.op);}};
  ALL.push(o);return o;
}
function mkPath(){
  const el=document.createElementNS(SVGNS,"path");gRoot.appendChild(el);
  el.setAttribute("fill","none");
  const o={el,color:COL.axis,width:1.5,dash:"",d:"",
    cur:{op:0},tar:{op:0},from:{},
    render(){el.setAttribute("d",this.d);el.setAttribute("stroke",this.color);
      el.setAttribute("stroke-width",this.width);el.setAttribute("opacity",this.cur.op);
      if(this.dash)el.setAttribute("stroke-dasharray",this.dash);else el.removeAttribute("stroke-dasharray");}};
  ALL.push(o);return o;
}

/* ---------- static structural objects (created first, drawn behind) ---------- */
const axisX=mkLine(),axisY=mkLine(),refLine=mkLine();
axisX.color=COL.axis;axisY.color=COL.axis;refLine.color="#bdbbb4";refLine.dash="5 5";
const logistic=mkPath();logistic.color="#c9bfa9";logistic.width=2;logistic.dash="6 5";
// build logistic d
(function(){let d="";for(let i=0;i<=60;i++){const u=i/60;const x=PX0+u*(PX1-PX0);
  const val=1/(1+Math.exp(-9*(u-0.5)));const y=470-val*160;d+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}
  logistic.d=d;})();

/* hinged axis: interpolates an ANGLE so the y-axis can fold down onto the x-axis */
const AX=512;                                  // shared baseline for the covariate plane / ruler
const foldAxis=(function(){
  const el=document.createElementNS(SVGNS,"line");gRoot.appendChild(el);
  const o={el,color:COL.axis,width:1.6,pivotX:PX0,pivotY:AX,len:AX-PY0,
    cur:{ang:0,op:0},tar:{ang:0,op:0},from:{},
    render(){const a=this.cur.ang;
      el.setAttribute("x1",this.pivotX);el.setAttribute("y1",this.pivotY);
      el.setAttribute("x2",this.pivotX+this.len*Math.sin(a));
      el.setAttribute("y2",this.pivotY-this.len*Math.cos(a));
      el.setAttribute("stroke",this.color);el.setAttribute("stroke-width",this.width);
      el.setAttribute("opacity",this.cur.op);}};
  ALL.push(o);return o;
})();

/* DiD markers + trend lines */
const mC0=mkCircle(),mC1=mkCircle(),mC2=mkCircle(),mC3=mkCircle(),
      mT0=mkCircle(),mT1=mkCircle(),mT2=mkCircle(),mT3=mkCircle(),mCF=mkCircle();
mC0.color=mC1.color=mC2.color=mC3.color=COL.ctrl;
mT0.color=mT1.color=mT2.color=mT3.color=COL.treat;mCF.color=COL.cf;
const lnC=mkLine(),lnC2=mkLine(),lnC3=mkLine(),lnT=mkLine(),lnT2=mkLine(),lnT3=mkLine(),lnCF=mkLine(),brk=mkLine();
lnC.color=lnC2.color=lnC3.color=COL.ctrl;lnC.width=lnC2.width=lnC3.width=2.2;
lnT.color=lnT2.color=lnT3.color=COL.treat;lnT.width=lnT2.width=lnT3.width=2.2;
lnCF.color=COL.cf;lnCF.width=2.2;lnCF.dash="7 5";brk.color=COL.cf;brk.width=2.4;

/* event-study */
const HCOL=["#3f7cba","#2f8f6b","#c7952b","#9b6ab8","#d96b55"];
const ADOPT_YEARS=[2017,2018,2020],LAST_YEAR=2022;
const EVENT_OBS=[];
ADOPT_YEARS.forEach((adopt,cohort)=>{for(let year=adopt+1;year<=LAST_YEAR;year++)EVENT_OBS.push({cohort,adopt,year,h:year-adopt});});
const evPts=[],evBars=[];for(let i=0;i<5;i++){const p=mkCircle();p.color=HCOL[i];evPts.push(p);
  const b=mkLine();b.color=HCOL[i];b.width=2;evBars.push(b);}

/* schools */
const N=34;const schools=[];
(function(){let s=20240705;const rnd=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
  for(let i=0;i<N;i++){
    const T=i<17;
    const nse=T?0.40+rnd()*0.45:0.20+rnd()*0.50;     // treatment tends higher NSE, with overlap
    const fem=0.28+rnd()*0.5;
    const ps=1/(1+Math.exp(-(2.3*(nse-0.5)+0.7*(fem-0.5))));
    const ab=Math.max(0.02,0.15-0.13*nse+(rnd()-0.5)*0.03); // abandono rate (illustrative)
    const c=mkCircle();c.color=T?COL.treat:COL.ctrl;
    schools.push({o:c,T,nse,fem,ps,ab,jx:(rnd()-0.5)*46,jy:(rnd()-0.5)*46});
  }})();

/* matching lines pool */
const matchLines=[];for(let i=0;i<9;i++){const l=mkLine();l.color="#b7b3a8";l.width=1.3;matchLines.push(l);}

/* intro ghosts */
const focus=mkCircle(),ghostT=mkCircle(),ghostC=mkCircle();
focus.color="#7d8791";ghostT.color=COL.treat;ghostC.color=COL.cf;ghostC.dash="4 3";ghostC.stroke=COL.cf;

/* text slots */
const xLabel=mkText(15,600,"middle");xLabel.fill=COL.muted;
/* y-axis title: rotated -90°, running along the y-axis, left of it */
const Y_LABEL_X=PX0-46,Y_LABEL_Y=(PY0+PY1)/2;
const yLabel=(function(){
  const el=document.createElementNS(SVGNS,"text");gRoot.appendChild(el);
  el.setAttribute("font-family","system-ui,-apple-system,Segoe UI,Roboto,sans-serif");
  el.setAttribute("font-size",15);el.setAttribute("font-weight",600);
  el.setAttribute("text-anchor","middle");el.setAttribute("dominant-baseline","middle");
  const o={el,txt:"",fill:COL.muted,
    cur:{x:Y_LABEL_X,y:Y_LABEL_Y,op:0},tar:{x:Y_LABEL_X,y:Y_LABEL_Y,op:0},from:{},
    set(s){this.txt=s;},
    render(){el.textContent=this.txt;el.setAttribute("x",this.cur.x);el.setAttribute("y",this.cur.y);
      el.setAttribute("transform","rotate(-90 "+this.cur.x+" "+this.cur.y+")");
      el.setAttribute("fill",this.fill);el.setAttribute("opacity",this.cur.op);}};
  ALL.push(o);return o;
})();
const capA=mkText(14,500,"middle"),capB=mkText(14,500,"middle"),
      capC=mkText(14,600,"middle"),capD=mkText(14,500,"middle");
capC.fill=COL.cf;

/* extra text + DiD/staggered objects */
const topMsg=mkText(15,600,"middle");
const lblT=mkText(13,700,"start"),lblC=mkText(13,700,"start");
const ann=[mkText(13,500,"middle"),mkText(13,500,"middle"),mkText(13,500,"middle")];
const yrLbl=[];for(let i=0;i<5;i++)yrLbl.push(mkText(12,500,"middle"));
const didYearLbl=[];for(let i=0;i<4;i++)didYearLbl.push(mkText(12,500,"middle"));
const gap0=mkLine(),gap1=mkLine();
const stagPre=[],stagPost=[],stagDot=[],lblCoh=[],dotLbl=[];
const bridgeTreatDots=[],bridgeCtrlDots=[],bridgeLinks=[],bridgeGuides=[];
const yearTicks=[],yearTickLbl=[],pointLbl=[];
for(let i=0;i<=LAST_YEAR-2017;i++){
  const tick=mkLine();tick.color=COL.axis;tick.width=1.2;yearTicks.push(tick);
  yearTickLbl.push(mkText(12,500,"middle"));
}
for(let i=0;i<3;i++){
  const a=mkLine();a.color=COL.ctrl;a.width=6;stagPre.push(a);
  const b=mkLine();b.color=COL.treat;b.width=6;stagPost.push(b);
  const d=mkCircle();d.color=COL.cf;stagDot.push(d);
  lblCoh.push(mkText(13,700,"end"));
  dotLbl.push(mkText(12,600,"middle"));
}
for(let i=0;i<EVENT_OBS.length;i++){
  const bt=mkCircle();bt.color=COL.treat;bridgeTreatDots.push(bt);
  const bc=mkCircle();bc.color=COL.ctrl;bc.stroke="#fff";bc.sw=2;bridgeCtrlDots.push(bc);
  const bl=mkLine();bl.color="#b7b3a8";bl.width=1.4;bridgeLinks.push(bl);
  const bg=mkLine();bg.color="#d4d1c8";bg.width=1;bg.dash="4 5";bridgeGuides.push(bg);
  pointLbl.push(mkText(11,700,"middle"));
}

/* ---------- helpers ---------- */
function hideAll(){ALL.forEach(o=>{o.tar={};for(const k in o.cur)o.tar[k]=o.cur[k];o.tar.op=0;});}
function show(o,props){for(const k in props)o.tar[k]=props[k];}
function nearest(ps,pool){let best=null,bd=9;pool.forEach(p=>{const d=Math.abs(p.ps-ps);if(d<bd){bd=d;best=p;}});return best;}
const calYear=year=>sx(year,2017,LAST_YEAR);
const eventX=h=>470+(h-1)*145;
const eventEff=[-3.2,-2.4,-1.6,-0.8,-0.2],eventCI=[1.5,1.3,1.2,1.2,1.4];
const didYears=[2017,2018,2019,2020],didX=[xAnte,xPost,x2019,x2020];
const cVals=[6,9,10.2,12],tVals=[8,12.5,13.6,15.2];
function horizonLabel(h){return h===1?"+1 ano":"+"+h;}
function showCalendarAxis(label){
  show(axisX,{x1:calYear(2017),y1:PY1,x2:calYear(LAST_YEAR),y2:PY1,op:1});
  for(let year=2017;year<=LAST_YEAR;year++){
    const i=year-2017,x=calYear(year);
    show(yearTicks[i],{x1:x,y1:PY1-6,x2:x,y2:PY1+6,op:1});
    yearTickLbl[i].set(""+year);show(yearTickLbl[i],{x:x,y:PY1+20,op:1});yearTickLbl[i].fill=COL.muted;
  }
  xLabel.set(label);show(xLabel,{x:(calYear(2017)+calYear(LAST_YEAR))/2,y:PY1+42,op:1});
}
function layoutEventGroups(){
  topMsg.set("primeiro: agrupamos os pontos da mesma cor");
  show(topMsg,{x:655,y:PY0-8,op:1});topMsg.fill=COL.cf;
  show(axisX,{x1:eventX(1)-42,y1:PY1,x2:eventX(5)+42,y2:PY1,op:.45});
  xLabel.set("grupos por anos de implantação");
  show(xLabel,{x:(eventX(1)+eventX(5))/2,y:PY1+42,op:1});
  for(let h=1;h<=5;h++){
    yrLbl[h-1].set(horizonLabel(h));
    show(yrLbl[h-1],{x:eventX(h),y:PY1+20,op:1});yrLbl[h-1].fill=HCOL[h-1];
  }
  EVENT_OBS.forEach((obs,i)=>{
    const same=EVENT_OBS.filter(o=>o.h===obs.h);
    const pos=same.findIndex(o=>o===obs);
    const x=eventX(obs.h)+(pos-(same.length-1)/2)*18;
    const y=338+(obs.h%2)*28+(pos%2)*12;
    bridgeTreatDots[i].color=HCOL[obs.h-1];
    show(bridgeTreatDots[i],{x:x,y:y,r:7,op:1});
    pointLbl[i].set(horizonLabel(obs.h));show(pointLbl[i],{x:x,y:y-17,op:.8});pointLbl[i].fill=HCOL[obs.h-1];
  });
  ann[0].set("cada grupo de cor vira uma estimativa média por horizonte");
  show(ann[0],{x:655,y:520,op:1});ann[0].fill=COL.muted;
}
function showDidYearLabels(){
  didYears.forEach((year,i)=>{
    didYearLbl[i].set(""+year);
    show(didYearLbl[i],{x:didX[i],y:PY1+20,op:1});
    didYearLbl[i].fill=COL.muted;
  });
  xLabel.set("ano");show(xLabel,{x:(xAnte+x2020)/2,y:PY1+42,op:1});
}
function showDidSeries(extraOp=1){
  show(mC0,{x:xAnte,y:yD(cVals[0]),r:11,op:1});show(mT0,{x:xAnte,y:yD(tVals[0]),r:11,op:1});
  show(mC1,{x:xPost,y:yD(cVals[1]),r:11,op:1});show(mT1,{x:xPost,y:yD(tVals[1]),r:11,op:1});
  show(lnC,{x1:xAnte,y1:yD(cVals[0]),x2:xPost,y2:yD(cVals[1]),op:1});
  show(lnT,{x1:xAnte,y1:yD(tVals[0]),x2:xPost,y2:yD(tVals[1]),op:1});
  show(mC2,{x:x2019,y:yD(cVals[2]),r:9,op:extraOp});show(mT2,{x:x2019,y:yD(tVals[2]),r:9,op:extraOp});
  show(mC3,{x:x2020,y:yD(cVals[3]),r:9,op:extraOp});show(mT3,{x:x2020,y:yD(tVals[3]),r:9,op:extraOp});
  show(lnC2,{x1:xPost,y1:yD(cVals[1]),x2:x2019,y2:yD(cVals[2]),op:extraOp});
  show(lnC3,{x1:x2019,y1:yD(cVals[2]),x2:x2020,y2:yD(cVals[3]),op:extraOp});

function matchedPairs(){
  const available=schools.filter(s=>!s.T);
  return schools
    .filter(s=>s.T&&s.ps>0.18&&s.ps<0.86)
    .slice(0,8)
    .map(t=>{

      return {t,c};
    });
}

  show(lnT,{x1:rx0,y1:yD(aT0),x2:rx1,y2:yD(aT1),op:1});
  show(lnCF,{x1:rx0,y1:yD(aT0),x2:rx1,y2:yD(T1cf()),op:1});
  show(brk,{x1:rx1+22,y1:yD(aT1),x2:rx1+22,y2:yD(T1cf()),op:1});
  capB.set("DiD — remove o NÃO OBSERVÁVEL fixo (ao longo do tempo)");
  show(capB,{x:860,y:250,op:1});capB.fill=COL.treat;
  capD.set("aplicados nas duas unidades:  escola  •  aluno");
  show(capD,{x:655,y:PY1+18,op:1});capD.fill=COL.muted;
}
];

let cur=0;const total=layouts.length;
const elTitle=document.getElementById("title"),elSub=document.getElementById("subtitle"),
      elNote=document.getElementById("note"),elCount=document.getElementById("counter"),
      fog=document.getElementById("fog"),
      legend=document.getElementById("legend"),
      lgCF=document.getElementById("lgCF"),ditab=document.getElementById("ditab");

function chrome(i){
  elTitle.textContent=META[i][0];
  elSub.innerHTML=META[i][1];
  elNote.innerHTML=META[i][2];
  elCount.textContent=(i+1)+" / "+total;
  ditab.classList.toggle("on", i===11);       // 2x2 table on the double-difference slide
  fog.classList.toggle("on", i===6);
  // legend: keep treatment/control visible through the first DiD transition.
  const hasDots=(i>=1&&i<=11)||i===15;
  const axisSide=(i>=7&&i<=11);
  const hasCF=(i>=10&&i<=11)||i===15;
  legend.classList.toggle("on", hasDots);
  legend.classList.toggle("axis-side", axisSide);
  lgCF.style.display=hasCF?"":"none";
}

async function goTo(i){
  if(i<0||i>=total)return;
  const prev=cur;
  cur=i;animGen++;const gen=animGen;
  if(prev===7&&i===8){
    hideAll();layoutDidGrowthStart();
    chrome(i);
    const ok=await commit(360,gen);
    if(!ok)return;
  }
  if(prev===13&&i===14){
    hideAll();layoutEventGroups();
    chrome(i);
    const ok=await commit(560,gen);
    if(!ok)return;
  }
  hideAll();layouts[i]();
  chrome(i);
  await commit(720,gen);
}

/* nav */
document.getElementById("next").onclick=()=>goTo(cur+1);
document.getElementById("prev").onclick=()=>goTo(cur-1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" "){e.preventDefault();goTo(cur+1);}
  else if(e.key==="ArrowLeft"){e.preventDefault();goTo(cur-1);}
});
/* init */
ALL.forEach(o=>o.render());
goTo(0);
</script>
